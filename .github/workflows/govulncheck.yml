name: govulncheck

on:
  workflow_call:
    inputs:
      go-version:
        description: Go toolchain version (matches go.mod toolchain when possible)
        type: string
        default: "1.24"
      working-directory:
        description: Directory to run govulncheck in (use "." for repo root)
        type: string
        default: "."
      patterns:
        description: Package patterns passed to govulncheck (e.g. "./...")
        type: string
        default: "./..."

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: cicd-sensor/cicd-sensor-action@1935de498397aa7b9bf6ac7ca822ddb430a34843 # v0.0.31
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        working-directory: ${{ inputs.working-directory }}
        run: govulncheck ${{ inputs.patterns }}
