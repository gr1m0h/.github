name: govulncheck

on:
  workflow_call:
    inputs:
      go-version:
        description: >-
          Explicit Go toolchain version. Leave empty (the default) to read the
          version from the target repo's go.mod, which keeps the CI toolchain
          in lock-step with the module's `go` directive.
        type: string
        default: ""
      working-directory:
        description: Directory to run govulncheck in (use "." for repo root)
        type: string
        default: "."
      patterns:
        description: Package patterns passed to govulncheck (e.g. "./...")
        type: string
        default: "./..."

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: cicd-sensor/cicd-sensor-action@777ddaafc9ec2e09c9779cdb860e75906adc19c2 # v0.0.34
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          # When go-version is empty, setup-go falls back to go-version-file so
          # the toolchain always matches the target repo's go.mod.
          go-version: ${{ inputs.go-version }}
          go-version-file: ${{ inputs.working-directory }}/go.mod
          cache: true
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@d1f380186385b4f64e00313f31743df8e4b89a77 # v1.1.4
      - name: govulncheck
        working-directory: ${{ inputs.working-directory }}
        run: govulncheck ${{ inputs.patterns }}
