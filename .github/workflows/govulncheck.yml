name: govulncheck

on:
  workflow_call:
    inputs:
      go-version:
        description: Go toolchain version (matches go.mod toolchain when possible)
        type: string
        default: "1.24"
      working-directory:
        description: Directory to run govulncheck in (use "." for repo root)
        type: string
        default: "."
      patterns:
        description: Package patterns passed to govulncheck (e.g. "./...")
        type: string
        default: "./..."

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: cicd-sensor/cicd-sensor-action@1935de498397aa7b9bf6ac7ca822ddb430a34843 # v0.0.31
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@d1f380186385b4f64e00313f31743df8e4b89a77 # v1.1.4
      - name: govulncheck
        working-directory: ${{ inputs.working-directory }}
        run: govulncheck ${{ inputs.patterns }}
