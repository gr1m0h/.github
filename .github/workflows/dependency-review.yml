name: dependency-review

on:
  workflow_call:
    inputs:
      fail-on-severity:
        description: low | moderate | high | critical
        type: string
        default: high
      deny-licenses:
        description: comma-separated SPDX list (e.g. "GPL-3.0,AGPL-3.0")
        type: string
        default: ""

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: cicd-sensor/cicd-sensor-action@3a3a447ad3668a3e205bf1273f2f2806bbbd30f3 # v0.0.33
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: ${{ inputs.fail-on-severity }}
          deny-licenses: ${{ inputs.deny-licenses }}
          comment-summary-in-pr: on-failure
