name: dependency-review

on:
  workflow_call:
    inputs:
      fail-on-severity:
        description: low | moderate | high | critical
        type: string
        default: high
      deny-licenses:
        description: comma-separated SPDX list (e.g. "GPL-3.0,AGPL-3.0")
        type: string
        default: ""

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: cicd-sensor/cicd-sensor-action@1935de498397aa7b9bf6ac7ca822ddb430a34843 # v0.0.31
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: ${{ inputs.fail-on-severity }}
          deny-licenses: ${{ inputs.deny-licenses }}
          comment-summary-in-pr: on-failure
