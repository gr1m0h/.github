name: rulesets-apply
on:
  push:
    branches: [main]
    paths:
      - "security/baseline.yaml"
      - "security/rulesets/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.BASELINE_APP_ID }}
          private-key: ${{ secrets.BASELINE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - name: apply rulesets to all repos
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          owner=gr1m0h
          yq -o=json security/baseline.yaml > /tmp/baseline.json

          # Read scope (defaults: public / non-archived / non-fork).
          scope_vis=$(jq -r  '.scope.visibility // "public"' /tmp/baseline.json)
          scope_arc=$(jq -r  '.scope.archived   // false'    /tmp/baseline.json)
          scope_fork=$(jq -r '.scope.forks      // false'    /tmp/baseline.json)

          # Enumerate targets: if `repos:` is set use it as the opt-in list,
          # otherwise list every repo in the owner that matches scope.
          if jq -e '.repos' /tmp/baseline.json >/dev/null; then
            targets=$(jq -r '.repos[]' /tmp/baseline.json)
          else
            jq_filter=".[] | select(.isArchived==$scope_arc) | select(.isFork==$scope_fork)"
            [ "$scope_vis" = "public" ]  && jq_filter+=" | select(.visibility==\"PUBLIC\")"
            [ "$scope_vis" = "private" ] && jq_filter+=" | select(.visibility==\"PRIVATE\")"
            targets=$(gh repo list "$owner" --limit 200 \
              --json name,visibility,isArchived,isFork \
              --jq "$jq_filter | .name")
          fi

          for repo in $targets; do
              if jq -e --arg r "$repo" '.exclude[]? | select(.==$r)' /tmp/baseline.json >/dev/null; then
                echo "skip   $repo (excluded)"; continue
              fi
              # Resolve the rulesets to apply:
              #   repo_overrides[$r].rulesets       -> full replace
              #   repo_overrides[$r].rulesets_add   -> extend defaults.rulesets
              #   neither                           -> defaults.rulesets
              applies=$(jq -r --arg r "$repo" '
                (.repo_overrides[$r].rulesets //
                 (.defaults.rulesets + (.repo_overrides[$r].rulesets_add // []))) | unique | .[]
              ' /tmp/baseline.json)
              for rs in $applies; do
                json="security/rulesets/$rs.json"
                name=$(jq -r '.name' "$json")
                existing=$(gh api "/repos/$owner/$repo/rulesets" \
                  --jq ".[] | select(.name==\"$name\") | .id" 2>/dev/null)
                if [ -n "$existing" ]; then
                  gh api -X PUT "/repos/$owner/$repo/rulesets/$existing" \
                    --input "$json" --silent
                  echo "update $repo  $name"
                else
                  gh api -X POST "/repos/$owner/$repo/rulesets" \
                    --input "$json" --silent
                  echo "create $repo  $name"
                fi
              done
            done
