name: codeql-go

on:
  workflow_call:
    inputs:
      go-version:
        description: >-
          Explicit Go toolchain version. Leave empty (the default) to read the
          version from the target repo's go.mod, which keeps the CodeQL build
          toolchain in lock-step with the module's `go` directive.
        type: string
        default: ""

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [go]
    steps:
      - uses: cicd-sensor/cicd-sensor-action@3a3a447ad3668a3e205bf1273f2f2806bbbd30f3 # v0.0.33
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # When go-version is empty, setup-go falls back to go-version-file so
          # the CodeQL autobuild toolchain always matches the target repo's go.mod.
          go-version: ${{ inputs.go-version }}
          go-version-file: go.mod
          cache: true
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
