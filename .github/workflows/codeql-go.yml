name: codeql-go

on:
  workflow_call:
    inputs:
      go-version:
        description: >-
          Explicit Go toolchain version. Leave empty (the default) to read the
          version from the target repo's go.mod, which keeps the CodeQL build
          toolchain in lock-step with the module's `go` directive.
        type: string
        default: ""

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [go]
    steps:
      - uses: cicd-sensor/cicd-sensor-action@777ddaafc9ec2e09c9779cdb860e75906adc19c2 # v0.0.34
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          # When go-version is empty, setup-go falls back to go-version-file so
          # the CodeQL autobuild toolchain always matches the target repo's go.mod.
          go-version: ${{ inputs.go-version }}
          go-version-file: go.mod
          cache: true
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
