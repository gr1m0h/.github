name: npm-audit

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "20"
      audit-level:
        description: low | moderate | high | critical
        type: string
        default: high
      omit:
        description: dependency groups to skip (e.g. "dev")
        type: string
        default: dev

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: cicd-sensor/cicd-sensor-action@777ddaafc9ec2e09c9779cdb860e75906adc19c2 # v0.0.34
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
      - name: npm audit
        run: npm audit --audit-level=${{ inputs.audit-level }} --omit=${{ inputs.omit }}
