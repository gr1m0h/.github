name: npm-audit

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "20"
      audit-level:
        description: low | moderate | high | critical
        type: string
        default: high
      omit:
        description: dependency groups to skip (e.g. "dev")
        type: string
        default: dev

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: cicd-sensor/cicd-sensor-action@1935de498397aa7b9bf6ac7ca822ddb430a34843 # v0.0.31
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
      - name: npm audit
        run: npm audit --audit-level=${{ inputs.audit-level }} --omit=${{ inputs.omit }}
