name: npm-audit

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "20"
      audit-level:
        description: low | moderate | high | critical
        type: string
        default: high
      omit:
        description: dependency groups to skip (e.g. "dev")
        type: string
        default: dev

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: cicd-sensor/cicd-sensor-action@3a3a447ad3668a3e205bf1273f2f2806bbbd30f3 # v0.0.33
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
      - name: npm audit
        run: npm audit --audit-level=${{ inputs.audit-level }} --omit=${{ inputs.omit }}
