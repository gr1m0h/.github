name: osv-scanner

on:
  workflow_call:
    inputs:
      scan-args:
        description: Extra arguments forwarded to osv-scanner
        type: string
        default: "--recursive ./"

permissions:
  contents: read
  security-events: write

jobs:
  osv-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: cicd-sensor/cicd-sensor-action@3a3a447ad3668a3e205bf1273f2f2806bbbd30f3 # v0.0.33
      # Without an explicit checkout the scanner runs against an empty
      # workspace and reports zero findings (a silent false negative).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: ${{ inputs.scan-args }}
