name: osv-scanner

on:
  workflow_call:
    inputs:
      scan-args:
        description: Extra arguments forwarded to osv-scanner
        type: string
        default: "--recursive ./"

permissions:
  contents: read
  security-events: write

jobs:
  osv-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: cicd-sensor/cicd-sensor-action@777ddaafc9ec2e09c9779cdb860e75906adc19c2 # v0.0.34
      # Without an explicit checkout the scanner runs against an empty
      # workspace and reports zero findings (a silent false negative).
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: ${{ inputs.scan-args }}
