name: Enhancement Proposal
description: Propose a significant enhancement or architectural change
title: "[Enhancement] "
labels: ["enhancement", "discussion"]
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this enhancement?
      options:
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the enhancement.
      placeholder: Describe the enhancement...
    validations:
      required: true

  - type: textarea
    id: current-workflow
    attributes:
      label: Current workflow
      description: Describe how things work currently.
    validations:
      required: true

  - type: textarea
    id: proposed-workflow
    attributes:
      label: Proposed workflow
      description: Describe the proposed new workflow.
    validations:
      required: true

  - type: textarea
    id: benefits
    attributes:
      label: Benefits
      description: List the benefits this enhancement would provide.
      value: |
        -
        -
        -
    validations:
      required: true

  - type: textarea
    id: challenges-and-mitigation
    attributes:
      label: Challenges and mitigation strategies
      description: Identify potential challenges and how they could be addressed.
      value: |
        ### Challenge:

        **Mitigation:**

        ### Challenge:

        **Mitigation:**
    validations:
      required: false

  - type: textarea
    id: implementation-considerations
    attributes:
      label: Implementation considerations
      description: Technical considerations for implementation.
      value: |
        -
        -
        -
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context, research, or examples.
    validations:
      required: false
