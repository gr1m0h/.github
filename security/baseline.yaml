# Single source of truth for what is applied to which repos.
#
# Read by:
#   .github/workflows/rulesets-apply.yml  -> applies `rulesets` via the GitHub API
#   .github/workflows/files-apply.yml     -> PRs `files` into target repos

# -----------------------------------------------------------------------------
# Repo selection
# -----------------------------------------------------------------------------
# If `repos:` is defined, only those repos are covered (opt-in list).
# Otherwise every repo in the owner that matches `scope` is covered.
scope:
  visibility: public          # public | private | all
  archived: false             # include archived repos
  forks: false                # include forks

# Repos that match `scope` but should be skipped entirely.
# Applied to BOTH rulesets-apply and files-apply (hard never-touch list).
exclude:
  - gr1m0h                    # profile README repo
  - hatenablog-contents       # content-only, no CI

# -----------------------------------------------------------------------------
# files-apply narrower scope (subset of rulesets coverage).
#
# Rulesets are cheap and uniformly safe to apply, so they target every repo
# matched by `scope`. Files (reusable security workflow callers) require the
# repo to actually run CI, so we maintain an explicit allowlist here.
#
# Semantics:
#   - If `files_apply.repos` is defined, files-apply targets ONLY those repos.
#   - If absent, files-apply falls back to the global `scope` enumeration
#     (same behavior as rulesets-apply).
#   - Top-level `exclude` is honored regardless.
# -----------------------------------------------------------------------------
files_apply:
  repos:
    - asdf-act
    - asdf-k6
    - asdf-soracom
    - asdf-starship
    - asdf-terraformer
    - asdf-vegeta
    - k6-ec2
    - terraform-aws-cloudwatch-dashboard-for-loadtesting
    - vimpin
    - vimpin-action
    - vimpin-renovate-config

# -----------------------------------------------------------------------------
# Defaults — applied to every covered repo unless overridden below.
# -----------------------------------------------------------------------------
defaults:
  # Rulesets to apply. Each name must match security/rulesets/<name>.json.
  rulesets:
    - main-protection

  # Files to PR into the target repo.
  #
  # Fields:
  #   src         (required) path inside this repo (template, may contain @<tag>)
  #   dst         (required) path inside the target repo
  #   languages   (optional) only apply if target's primary language is in this list
  #   create_only (optional) skip if the file already exists in the target
  files:
    - src: templates/caller-go.yml.template
      dst: .github/workflows/security.yml
      languages: [Go]
    - src: templates/caller-node.yml.template
      dst: .github/workflows/security.yml
      languages: [TypeScript, JavaScript]
    - src: templates/caller-shell.yml.template
      dst: .github/workflows/security.yml
      languages: [Shell]
    - src: templates/caller-hcl.yml.template
      dst: .github/workflows/security.yml
      languages: [HCL]
    # CODEOWNERS is NOT inherited from the org-level gr1m0h/.github repo, so a
    # concrete copy has to be distributed into each target repo to centralize
    # reviewer auto-assignment without GitHub Actions. No `languages` filter:
    # reviewer assignment is language-agnostic and should reach every covered
    # repo (asdf-* shell plugins and the rest of the files_apply allowlist).
    - src: templates/CODEOWNERS.template
      dst: CODEOWNERS

# -----------------------------------------------------------------------------
# Per-repo overrides — merged on top of `defaults`.
#
# Use the bare key (e.g. `rulesets:`) to fully replace the default list, or
# the `_add` suffix (e.g. `rulesets_add:`, `files_add:`) to extend it.
# -----------------------------------------------------------------------------
repo_overrides:
  vimpin:
    rulesets: [main-protection, tag-protection]
  vimpin-action:
    rulesets: [main-protection, tag-protection]
  vimpin-renovate-config:
    rulesets: [main-protection, tag-protection]
